<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Night Wash — Checkout</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; padding: 24px; }
    .card { max-width: 560px; margin: 0 auto; padding: 20px; border-radius: 16px; border: 1px solid #e7e7e7; }
    label { display:block; margin: 14px 0 6px; font-weight: 600; }
    input, select { width: 100%; padding: 12px 12px; border-radius: 12px; border: 1px solid #d8d8d8; font-size: 16px; }
    button { margin-top: 18px; width: 100%; padding: 14px 16px; border-radius: 14px; border: 0; font-size: 16px; cursor:pointer; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .hint { margin-top: 10px; font-size: 13px; opacity: .75; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 6px;">Оплата Night Wash</h1>
    <div class="hint">Заполни данные — мы передадим их в Stripe как metadata и используем для выполнения заказа.</div>

    <label>План</label>
    <select id="plan">
      <option value="essential">Essential</option>
      <option value="comfort">Comfort</option>
      <option value="elite">Elite</option>
      <option value="signature">Signature</option>
    </select>

    <label>Марка авто</label>
    <input id="car_make" placeholder="Например: BMW X5" />

    <label>Адрес</label>
    <input id="address" placeholder="Улица, дом, город" />

    <div class="row">
      <div>
        <label>Парковочное место</label>
        <input id="parking_spot" placeholder="Напр: P-12 / 2 этаж" />
      </div>
      <div>
        <label>Когда мыть</label>
        <input id="wash_datetime" type="datetime-local" />
      </div>
    </div>

    <button id="pay">Перейти к оплате</button>
    <div class="hint" id="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);

    // можно предзаполнить план из URL: ?plan=elite
    const planFromUrl = (params.get("plan") || "").toLowerCase();
    if (planFromUrl) document.getElementById("plan").value = planFromUrl;

    // optional: если хочешь передавать эти значения из Tilda/URL
    const user_id = params.get("user_id") || "";
    const order_id = params.get("order_id") || "";

    document.getElementById("pay").onclick = async () => {
      const payload = {
        plan: document.getElementById("plan").value,
        user_id,
        order_id,
        car_make: document.getElementById("car_make").value.trim(),
        address: document.getElementById("address").value.trim(),
        parking_spot: document.getElementById("parking_spot").value.trim(),
        wash_datetime: document.getElementById("wash_datetime").value, // ISO-like
      };

      // простая валидация
      if (!payload.car_make || !payload.address || !payload.wash_datetime) {
        document.getElementById("msg").textContent =
          "Заполни минимум: марка авто, адрес, когда мыть.";
        return;
      }

      document.getElementById("msg").textContent = "Создаём оплату…";

      const r = await fetch("/.netlify/functions/create-checkout", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      });

      const data = await r.json();
      if (data.url) {
        location.href = data.url;
      } else {
        document.getElementById("msg").textContent =
          (data && data.error) ? ("Ошибка: " + data.error) : "Ошибка создания оплаты.";
      }
    };
  </script>
</body>
</html>
