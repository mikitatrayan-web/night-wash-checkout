<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Night Wash — Checkout</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; padding: 24px; }
    .card { max-width: 720px; margin: 0 auto; padding: 22px; border-radius: 16px; border: 1px solid #e7e7e7; }
    label { display:block; margin: 14px 0 6px; font-weight: 600; }
    input, select { width: 100%; padding: 12px 12px; border-radius: 12px; border: 1px solid #d8d8d8; font-size: 16px; box-sizing: border-box; }
    button { margin-top: 18px; width: 100%; padding: 14px 16px; border-radius: 14px; border: 0; font-size: 16px; cursor:pointer; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .hint { margin-top: 10px; font-size: 13px; opacity: .75; line-height: 1.35; }
    .consent { display:flex; gap:10px; align-items:flex-start; margin-top: 14px; }
    .consent input { width:auto; margin-top: 3px; }
    a { color: inherit; }
    .error { color: #b00020; opacity: 1; }
    .muted { opacity: .8; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 6px;">Night Wash Payment</h1>
    <div class="hint">
      Please fill in the details below.
    </div>

    <label>Plan</label>
    <select id="plan">
      <option value="essential">Essential</option>
      <option value="comfort">Comfort</option>
      <option value="elite">Elite</option>
      <option value="signature">Signature</option>
    </select>

    <div class="row">
      <div>
        <label>First name</label>
        <input id="firstName" placeholder="e.g., Pepe" autocomplete="given-name" />
      </div>
      <div>
        <label>Last name</label>
        <input id="lastName" placeholder="e.g., Pérez" autocomplete="family-name" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Email</label>
        <input id="email" type="email" placeholder="pepito@gmail.com" autocomplete="email" />
      </div>
      <div>
        <label>Phone number</label>
        <input id="phoneNumber" placeholder="+34605999999" autocomplete="tel" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Plate number</label>
        <input id="plate" placeholder="e.g., 1234 ABC" autocomplete="off" />
      </div>
      <div>
        <label>Color</label>
        <input id="color" placeholder="e.g., Red" autocomplete="off" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Brand</label>
        <input id="brand" placeholder="e.g., Toyota" autocomplete="off" />
      </div>
      <div>
        <label>Model</label>
        <input id="model" placeholder="e.g., Corolla" autocomplete="off" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Floor level</label>
        <input id="floorLevel" placeholder="e.g., 1 / -1 / 2nd floor" autocomplete="off" />
      </div>
      <div>
        <label>Parking spot</label>
        <input id="parkingSpot" placeholder="e.g., 42 / P-12" autocomplete="off" />
      </div>
    </div>

    <label>Box delivery address</label>
    <input id="boxDeliveryAddress" placeholder="Street, building, city" autocomplete="street-address" />

    <div class="consent">
      <input type="checkbox" id="consent" />
      <div class="hint" style="margin:0;">
        I agree to the
        <a href="https://night-wash.com/terms2" target="_blank" rel="noopener noreferrer">Privacy Policy</a>.
      </div>
    </div>

    <button id="pay">Continue to payment</button>
    <div class="hint" id="msg"></div>

    
  </div>

  <script>
    const params = new URLSearchParams(location.search);

    // Preselect plan from URL: ?plan=elite
    const planFromUrl = (params.get("plan") || "").toLowerCase();
    if (planFromUrl) document.getElementById("plan").value = planFromUrl;

    // Optional IDs from URL (if you pass from Tilda)
    const user_id = params.get("user_id") || "";
    const order_id = params.get("order_id") || "";

    function val(id) {
      return (document.getElementById(id).value || "").trim();
    }

    document.getElementById("pay").addEventListener("click", async () => {
      const msg = document.getElementById("msg");
      msg.classList.remove("error");
      msg.textContent = "";

      if (!document.getElementById("consent").checked) {
        msg.classList.add("error");
        msg.textContent = "Please accept the Privacy Policy to continue.";
        return;
      }

      const payload = {
        plan: document.getElementById("plan").value,
        user_id,
        order_id,

        firstName: val("firstName"),
        lastName: val("lastName"),
        phoneNumber: val("phoneNumber"),
        email: val("email"),

        plate: val("plate"),
        brand: val("brand"),
        model: val("model"),
        color: val("color"),
        floorLevel: val("floorLevel"),
        parkingSpot: val("parkingSpot"),
        boxDeliveryAddress: val("boxDeliveryAddress"),
      };

      // Minimal required fields (adjust as you like)
      const required = [
        ["firstName", "First name"],
        ["lastName", "Last name"],
        ["phoneNumber", "Phone number"],
        ["email", "Email"],
        ["plate", "Plate number"],
        ["boxDeliveryAddress", "Box delivery address"],
      ];

      const missing = required.filter(([k]) => !payload[k]).map(([, label]) => label);

      if (missing.length) {
        msg.classList.add("error");
        msg.textContent = "Please fill in: " + missing.join(", ") + ".";
        return;
      }

      msg.textContent = "Creating payment…";

      try {
        const r = await fetch("/.netlify/functions/create-checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await r.json();
        if (data.url) {
          location.href = data.url;
        } else {
          msg.classList.add("error");
          msg.textContent = (data && data.error) ? ("Error: " + data.error) : "Failed to create payment.";
        }
      } catch (e) {
        msg.classList.add("error");
        msg.textContent = "Network error. Please try again.";
        console.error(e);
      }
    });
  </script>
</body>
</html>
